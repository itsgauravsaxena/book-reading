name: Paged
options:
  bundleIdPrefix: com.ymga
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.7"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic

targets:
  Paged:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
    resources:
      - path: App/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: Paged
        PRODUCT_BUNDLE_IDENTIFIER: com.ymga.bibliophil
        CODE_SIGN_ENTITLEMENTS: App/Paged.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan book ISBN barcodes to add titles quickly."
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: PagedWidget
        embed: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: bibliophil
        LSApplicationCategoryType: public.app-category.lifestyle

  PagedWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Sources/Util/SharedStore.swift
      - path: Sources/Models/DayKey.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ymga.bibliophil.widget
        PRODUCT_NAME: PagedWidget
        CODE_SIGN_ENTITLEMENTS: Widget/PagedWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
