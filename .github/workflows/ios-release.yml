name: iOS Release

# Manual trigger, or push a tag like v0.1.0
on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options: [beta, release]
  push:
    tags:
      - "v*"

jobs:
  build-upload:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run fastlane
        env:
          CI: "true"
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          # First-ever run must create certs: set repo variable MATCH_READONLY=false once,
          # then remove it so subsequent runs are read-only.
          MATCH_READONLY: ${{ vars.MATCH_READONLY }}
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bibliophil-ipa
          path: "*.ipa"
          if-no-files-found: ignore
